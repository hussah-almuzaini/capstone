<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>صفحة رفع الملف</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
</head>
<body>
  <img id="logo" src="/static/logo.png" alt="شعار بصير">
  <h1>مرحباً بك في صفحة رفع الملف</h1>
  <p id="heardText">🎧 بانتظار الصوت...</p>

  <div id="uploadBox">
    <h2>ارفع صورة أو فيديو</h2>
    <form id="uploadForm" enctype="multipart/form-data">
      <input id="fileInput" type="file" name="file" accept="image/*,video/*" required />
      <button type="submit">📤 رفع وتحليل</button>
    </form>
    <div id="result">📌 النتيجة:</div>
  </div>

  <!-- مشغل صوت مخفي -->
  <audio id="audioPlayer" style="display: none;" controls></audio>

  <script>
    const form = document.getElementById("uploadForm");
    const resultBox = document.getElementById("result");
    const fileInput = document.getElementById("fileInput");
    const audioPlayer = document.getElementById("audioPlayer");

    const speak = (text) => {
      const formData = new FormData();
      formData.append("text", text);

      fetch("/speak", {
        method: "POST",
        body: formData
      })
      .then(res => res.blob())
      .then(blob => {
        const url = URL.createObjectURL(blob);
        audioPlayer.src = url;
        audioPlayer.play();
      });
    };
    let isListening = false;


    const listen = () => {
      const r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      r.lang = 'ar-SA';

      r.onstart = () => isListening = true;
      r.onend = () => { isListening = false; setTimeout(listen, 800); };
      r.onerror = () => { isListening = false; setTimeout(listen, 800); };

      r.onresult = e => {
  const t = e.results[0][0].transcript.trim();
  const cleaned = t.toLowerCase().replace(/ال/g, "").trim();
  console.log("🎧 سمعت:", t, "| بعد التنظيف:", cleaned); 

  if (cleaned.includes("بحث")) {
    window.location.href = "/static/search.html";
  } else if (cleaned.includes("بث")) {
    window.location.href = "/static/stream.html";
  } else if (cleaned.includes("رفع")) {
    window.location.href = "/static/upload.html";
  } else if (cleaned.includes("رئيسيه")) {
    window.location.href = "/";
  }
};


      r.start();
    };

    form.onsubmit = async (e) => {
      e.preventDefault();
      resultBox.innerHTML = "⏳ جاري التحليل...";
      const formData = new FormData(form);
      const file = fileInput.files[0];
      const isVideo = file && file.type.includes("video");

      try {
        const analyzeRes = await fetch("/analyze", {
          method: "POST",
          body: formData
        });
        const analyzeData = await analyzeRes.json();

        if (analyzeData.error) {
          resultBox.innerHTML = "❌ خطأ: " + analyzeData.error;
          return;
        }

        if (!Array.isArray(analyzeData.captions) || analyzeData.captions.length === 0) {
          resultBox.innerHTML = "❌ لم يتم العثور على أي وصف.";
          return;
        }

 
        const captions = analyzeData.captions;

        const fullText = analyzeData.captions.join("\n");

        // ترجم الوصف
        const translationRes = await fetch("/translate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: fullText })
        });

        const translationData = await translationRes.json();
        const translated = translationData.translated || "❌ لم يتم الترجمة";

        //resultBox.innerHTML = `<h3>📌 الترجمة:</h3><p>${translated}</p>`;
        speak(translated);


      } catch (err) {
        resultBox.innerHTML = "⚠️ حدث خطأ أثناء الاتصال بالخادم.";
        console.error("⚠️ Server error:", err);
      }

    };

    listen();
  </script>
</body>
</html>
